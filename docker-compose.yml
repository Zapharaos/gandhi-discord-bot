services:
  bot:
    build:
      # Build from the monorepo root so the image can install the whole npm
      # workspace graph and compile @gandhi/core before the bot.
      context: .
      dockerfile: apps/bot/Dockerfile
    environment:
      # Keep the runtime in UTC so day bucketing and date rendering stay consistent.
      - TZ=UTC
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./data:/app/data
      - ./var:/app/var
    restart: unless-stopped
    command:
        - /bin/sh
        - -c
        - |
            npm run migrate
            node --enable-source-maps /app/apps/bot/dist/src/index.js

volumes:
  data: