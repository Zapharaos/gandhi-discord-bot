services:
  bot:
    build: .
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./data:/app/data
      - ./var:/app/var
    restart: unless-stopped
    command:
        - /bin/sh
        - -c
        - |
            npm run migrate
            node --enable-source-maps /app/dist/src/index.js

volumes:
  data: