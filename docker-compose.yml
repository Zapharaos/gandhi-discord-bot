services:
  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    env_file:
      - .env
    environment:
      - TZ=UTC
      - NODE_ENV=production
      - WEB_INTERNAL_WS_URL=ws://web-api:${WEB_PORT}/internal/events
      - INTERNAL_WS_TOKEN=${INTERNAL_WS_TOKEN}
    networks:
      - default
    volumes:
      - ./data:/app/data
      - ./var:/app/var
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - |
        npm run migrate
        exec node --enable-source-maps /app/apps/bot/dist/src/index.js
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:${PORT}/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

  web-api:
    build:
      context: .
      dockerfile: apps/web-api/Dockerfile
    environment:
      - TZ=UTC
      - NODE_ENV=production
      - WEB_HOST=0.0.0.0
      - WEB_PORT=${WEB_PORT}
      - WEB_BASE_URL=${WEB_BASE_URL}
      - WEB_FRONTEND_URL=${WEB_FRONTEND_URL}
      - DATABASE_URL=data/gandhi-bot.db
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - INTERNAL_WS_TOKEN=${INTERNAL_WS_TOKEN}
      - BOT_ADMIN_IDS=${BOT_ADMIN_IDS}
      - WEB_CORS_ORIGIN=${WEB_CORS_ORIGIN}
      - DISCORD_TOKEN=${DISCORD_TOKEN}
    ports:
      - "${WEB_PORT:-3007}:${WEB_PORT:-3007}"
    networks:
      - default
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:${WEB_PORT}/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web-ui:
    build:
      context: apps/web-ui
      dockerfile: Dockerfile
    depends_on:
      - web-api
    ports:
      - "${WEB_UI_PORT:-8082}:80"
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s