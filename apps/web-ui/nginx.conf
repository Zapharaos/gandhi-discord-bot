server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API + auth are reverse-proxied to the web service, so the SPA is served
    # same-origin and the session cookie flows without CORS.
    location /api/ {
        proxy_pass http://web-api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass http://web-api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket endpoint needs the upgrade headers.
    location /ws {
        proxy_pass http://web-api:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Translation files are NOT fingerprinted, so they must be revalidated on
    # every load — otherwise the browser serves a stale en.json/fr.json after a
    # redeploy and labels look "stuck".
    location /assets/i18n/ {
        add_header Cache-Control "no-cache";
    }

    # Fingerprinted build output (hashed filenames) can be cached forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback. `no-cache` makes the browser revalidate index.html (and the
    # hashed JS at the root) so a new deploy is always picked up — a 304 when
    # unchanged, the fresh file when it changed.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
