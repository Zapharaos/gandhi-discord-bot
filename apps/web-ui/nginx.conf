server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API + auth are reverse-proxied to the web service, so the SPA is served
    # same-origin and the session cookie flows without CORS.
    location /api/ {
        proxy_pass http://web-api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass http://web-api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket endpoint needs the upgrade headers.
    location /ws {
        proxy_pass http://web-api:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # SPA fallback: unknown routes are handled by the Angular router.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
