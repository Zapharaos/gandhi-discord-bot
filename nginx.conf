# ─────────────────────────────────────────────────────────────────────────────
# Gandhi Bot — nginx vhost
#
# Drop this file at /etc/nginx/conf.d/gandhibot.conf and reload nginx.
#
# Architecture:
#   gandhibot.freits.fr        →  web-ui  (Angular SPA, Docker host port 8082)
#   gandhibot.freits.fr/api/*  →  web-api (Express REST, Docker host port 3004)
#   gandhibot.freits.fr/auth/* →  web-api (Discord OAuth)
#   gandhibot.freits.fr/ws     →  web-api (WebSocket — live voice events)
#
# The bot's internal /health endpoint (port 3006) is intentionally NOT exposed
# through nginx — Docker uses it for its own healthcheck only.
#
# Prerequisites in the parent nginx.conf (already present in yours):
#   - resolver 127.0.0.11
#   - map $http_upgrade $connection_upgrade { ... }
#   - include /etc/nginx/conf.d/gandhibot.conf;
#
# SSL: adjust the ssl_certificate paths to your Let's Encrypt or custom certs.
# Certbot example:
#   certbot certonly --nginx -d gandhibot.freits.fr
#   → /etc/letsencrypt/live/gandhibot.freits.fr/fullchain.pem
#
# Rate-limiting zone (10 MB shared memory ≈ 160 000 IPs tracked at once).
# 60 r/s per IP is generous for a dashboard; tighten if you see abuse.
# ─────────────────────────────────────────────────────────────────────────────

limit_req_zone $binary_remote_addr zone=gandhi_api:10m rate=60r/s;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name gandhibot.freits.fr;
    return 301 https://gandhibot.freits.fr$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name gandhibot.freits.fr;

    ssl_certificate     /ssl/gandhibot_fullchain.pem;
    ssl_certificate_key /ssl/gandhibot_privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/gandhibot-access.log combined;
    error_log  /var/log/nginx/gandhibot-error.log warn;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options "nosniff"                      always;
    add_header X-XSS-Protection       "1; mode=block"                always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── WebSocket — live voice events ─────────────────────────────────────────
    # Must appear before /api/ so the prefix match doesn't steal /ws requests.
    location /ws {
        proxy_pass          http://gandhi-web-api:3007;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection $connection_upgrade;
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  86400s;  # keep long-lived WS connections alive
        proxy_buffering off;
    }

    # ── REST API — rate-limited ───────────────────────────────────────────────
    location /api/ {
        limit_req        zone=gandhi_api burst=100 nodelay;
        limit_req_status 429;

        proxy_pass         http://gandhi-web-api:3007;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Discord OAuth ─────────────────────────────────────────────────────────
    location /auth/ {
        proxy_pass         http://gandhi-web-api:3007;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Angular SPA (served by the web-ui container's internal nginx) ─────────
    # Everything else falls through to the SPA; the container handles the
    # Angular routing fallback, cache headers, and asset versioning itself.
    location / {
        proxy_pass         http://gandhi-web-ui:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /favicon.ico { access_log off; log_not_found off; }

    location ~ /\. {
        deny all;
        access_log    off;
        log_not_found off;
    }
}
